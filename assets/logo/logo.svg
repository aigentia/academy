<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="starGrad" cx="35%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#2E4878"/>
      <stop offset="60%"  stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- 4-pointed compass star with concave curved sides -->
  <path d="M 50,3
    C 52,30 70,48 97,50
    C 70,52 52,70 50,97
    C 48,70 30,52  3,50
    C 30,48 48,30 50, 3
    Z"
    fill="url(#starGrad)" filter="url(#shadow)"/>

  <!-- Gloss highlight upper-left -->
  <path d="M 50,3 C 52,28 60,40 68,46 C 56,28 52,14 50,3 Z"
    fill="rgba(255,255,255,0.10)"/>

  <!-- Person silhouette — head -->
  <circle cx="50" cy="40" r="10" fill="#E85D26"/>

  <!-- Person silhouette — shoulders / body dome -->
  <path d="M 27,70 Q 27,53 50,53 Q 73,53 73,70 Z" fill="#E85D26"/>
</svg>
